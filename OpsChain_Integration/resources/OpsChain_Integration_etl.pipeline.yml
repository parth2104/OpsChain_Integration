# The main pipeline for OpsChain_Integration

resources:
  pipelines:
    OpsChain_Integration_etl:
      name: OpsChain_Integration_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/OpsChain_Integration_etl"

      libraries:
        - glob:
            include: ../src/OpsChain_Integration_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
