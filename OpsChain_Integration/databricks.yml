    presets:
      name_prefix: ${workspace.current_user.short_name}
      source_linked_deployment: false

  prod:
    mode: production
    workspace:
      host: dbc-bc666962-a1a7.cloud.databricks.com
      root_path: /Workspace/Users/barotparth512@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prods
    permissions:
      - user_name: barotparth512@gmail.com
        level: CAN_MANAGE
