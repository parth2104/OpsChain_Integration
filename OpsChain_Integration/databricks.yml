  uuid: eaa0adfb-ce7f-4e7f-8058-a1aa844df812

include:
  - resources/*.yml
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: dbc-bc666962-a1a7.cloud.databricks.com
    variables:
      catalog: workspace
      schema: ${workspace.current_user.short_name}
